<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F.R.I.E.N.D. TC-52</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#08111f;color:white;height:100vh;overflow:hidden}
.app{width:100vw;height:100vh;display:flex;flex-direction:column}
.header{background:#0057b8;padding:10px;text-align:center}
.header h1{font-size:18px}
.header p{font-size:11px;color:#dbeafe}
.screen{flex:1;overflow-y:auto;padding:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{background:#13233b;border:1px solid #2f80ed;border-radius:12px;padding:14px 8px;text-align:center;font-size:13px;min-height:58px;display:flex;align-items:center;justify-content:center}
.btn:active{background:#2f80ed}
.card{background:#101b2e;border-radius:12px;padding:10px;margin-bottom:8px;border-left:4px solid #2f80ed}
.red{border-left-color:#ff3b30}
.yellow{border-left-color:#ffd60a}
.green{border-left-color:#30d158}
.title{font-size:16px;margin-bottom:8px;color:#7cc7ff}
.small{font-size:12px;color:#cbd5e1}
.bottom{display:grid;grid-template-columns:repeat(4,1fr);background:#050b14;border-top:1px solid #1e3a5f}
.nav{padding:10px 4px;text-align:center;font-size:11px;color:#cbd5e1}
.nav.active{color:#7cc7ff;background:#10213a}
.back{background:#1f2937;margin-bottom:8px}
.metric{display:flex;justify-content:space-between;font-size:13px;margin:6px 0}
.bar{height:7px;background:#25364f;border-radius:10px;overflow:hidden}
.fill{height:100%;background:#2f80ed}
</style>
</head>

<body>
<div class="app">

<div class="header">
<h1>F.R.I.E.N.D.</h1>
<p>TC-52 Store Touch Command</p>
</div>

<div class="screen" id="screen"></div>

<div class="bottom">
<div class="nav active" onclick="home()">Home</div>
<div class="nav" onclick="storeView()">Store</div>
<div class="nav" onclick="departments()">Depts</div>
<div class="nav" onclick="training()">Training</div>
</div>

</div>

<script>
const deptData={
"Meat":["Thaw & Sell","Fresh Replenishment","Markdowns","Temperatures","Sanitation","5S Backroom","Customer Service","Training"],
"Seafood":["Fresh Case","Frozen Seafood","Markdowns","Temperatures","Sanitation","5S","Customer Service","Training"],
"Deli":["Production","Grab & Go","Chicken","Markdowns","Food Safety","Cleaning","Service Case","Training"],
"Bakery":["Production","Packaging","Markdowns","Freshness","Sanitation","Cake Orders","5S","Training"],
"Produce":["Wet Rack","Dry Table","Fresh Cut","Markdowns","Rotation","Culling","Food Safety","Training"],
"Front End":["Checkout Speed","QueVision","Customer Service","Cash Control","Bagging","Go Backs","Breaks","Training"],
"E-Commerce":["Picking","Staging","Substitutions","Wait Time","Accuracy","Customer Handoff","Labor","Training"],
"GM":["Replenishment","Conditioning","Displays","Backstock","Price Accuracy","Markdowns","5S","Training"],
"HBC":["Replenishment","Conditioning","Security","Price Accuracy","Backstock","Displays","5S","Training"],
"Homeside":["Seasonal","Displays","Replenishment","Backstock","Price Accuracy","Conditioning","5S","Training"],
"Receiving":["Load Check-In","Backroom Flow","Vendor Control","Claims","Safety","5S","Pallet Flow","Training"],
"Maintenance":["Restrooms","Sales Floor","Spills","Trash","Safety Walk","Supply Check","Equipment","Training"],
"Starbucks":["Speed of Service","Cleanliness","Product Quality","Customer Service","Temps","Inventory","Labor","Training"],
"Murray's Cheese":["Specialty Case","Sampling","Freshness","Markdowns","Service","Inventory","Training","5S"],
"Liquor":["Security","Replenishment","Displays","Backstock","Price Accuracy","Customer Service","Inventory","Training"]
};

function set(html){document.getElementById("screen").innerHTML=html}

function home(){
set(`
<div class="card red">
<div class="title">Guided Mission</div>
<div>Priority Level: RED</div>
<div class="small">Stabilize total store execution</div>
</div>

<div class="grid">
<div class="btn" onclick="storeView()">Store Leader View</div>
<div class="btn" onclick="departments()">Departments</div>
<div class="btn" onclick="missions()">Missions</div>
<div class="btn" onclick="training()">Fresh Start</div>
</div>

<div class="card">
<div class="title">Today’s Composite</div>
<div class="metric"><span>Total Store</span><span>84%</span></div><div class="bar"><div class="fill" style="width:84%"></div></div>
<div class="metric"><span>Labor</span><span>78%</span></div><div class="bar"><div class="fill" style="width:78%"></div></div>
<div class="metric"><span>Fresh Shrink</span><span>72%</span></div><div class="bar"><div class="fill" style="width:72%"></div></div>
</div>
`)
}

function storeView(){
set(`
<div class="btn back" onclick="home()">← Back</div>
<div class="card">
<div class="title">Store Leader Overall Perspective</div>
<div class="small">F.R.I.E.N.D. reads the store as one connected system: sales, labor, shrink, food safety, service, and training.</div>
</div>
<div class="grid">
<div class="btn" onclick="missions()">Priority Missions</div>
<div class="btn" onclick="departments()">Department Health</div>
<div class="btn">Labor Balance</div>
<div class="btn">Shrink Risk</div>
<div class="btn">Food Safety</div>
<div class="btn">Associate Development</div>
</div>
`)
}

function departments(){
let html=`<div class="btn back" onclick="home()">← Back</div><div class="title">Departments</div><div class="grid">`;
Object.keys(deptData).forEach(d=>html+=`<div class="btn" onclick="openDept('${d}')">${d}</div>`);
html+=`</div>`;
set(html)
}

function openDept(name){
let html=`<div class="btn back" onclick="departments()">← Departments</div>
<div class="card"><div class="title">${name}</div><div class="small">Touch a subsection to open its command screen.</div></div>
<div class="grid">`;
deptData[name].forEach(s=>html+=`<div class="btn" onclick="subsection('${name}','${s}')">${s}</div>`);
html+=`</div>`;
set(html)
}

function subsection(dept,section){
set(`
<div class="btn back" onclick="openDept('${dept}')">← ${dept}</div>
<div class="card">
<div class="title">${section}</div>
<div class="small">${dept} Department Command Screen</div>
</div>

<div class="card red">
<b>Current Mission</b>
<p class="small">Review execution gap, complete required action, and confirm follow-up.</p>
</div>

<div class="grid">
<div class="btn">View Metrics</div>
<div class="btn">Complete Mission</div>
<div class="btn">Open Checklist</div>
<div class="btn">Training Help</div>
<div class="btn">Escalate Issue</div>
<div class="btn">Add Note</div>
</div>
`)
}

function missions(){
set(`
<div class="btn back" onclick="home()">← Back</div>
<div class="card red"><b>RED Mission</b><br><span class="small">Fresh shrink intervention</span></div>
<div class="card red"><b>RED Mission</b><br><span class="small">Total store priority walk</span></div>
<div class="card yellow"><b>YELLOW Mission</b><br><span class="small">Labor rebalance</span></div>
<div class="card green"><b>GREEN Mission</b><br><span class="small">Recognize strong execution</span></div>
`)
}

function training(){
set(`
<div class="btn back" onclick="home()">← Back</div>
<div class="card"><div class="title">Fresh Start Training</div></div>
<div class="grid">
<div class="btn">New Associate</div>
<div class="btn">Department Leader</div>
<div class="btn">Store Leader</div>
<div class="btn">Retail Operations</div>
<div class="btn">Food Safety</div>
<div class="btn">AI Interpretation</div>
</div>
`)
}

home();
</script>
</body>
</html>
