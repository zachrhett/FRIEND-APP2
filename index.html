<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>F.R.I.E.N.D. TC-52</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#07111f;
  color:white;
  font-family:Arial,Helvetica,sans-serif;
}
.tc52{
  width:100vw;
  height:100vh;
  max-width:420px;
  margin:auto;
  background:linear-gradient(180deg,#08192d,#020712);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.top{
  padding:8px 10px;
  font-size:12px;
  background:#020712;
  border-bottom:2px solid #1e90ff;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.brand{font-weight:bold;color:#fff}
.secure{color:#ffd84d}
.screen{
  flex:1;
  padding:10px;
  overflow:hidden;
}
.title{
  font-size:18px;
  font-weight:bold;
  color:#56b6ff;
}
.subtitle{
  font-size:11px;
  color:#c7d7e8;
  margin-bottom:8px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.btn{
  background:#102846;
  border:1px solid #2f9cff;
  border-radius:12px;
  padding:12px 8px;
  text-align:center;
  font-weight:bold;
  min-height:58px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.btn.red{border-color:#ff4d4d}
.btn.yellow{border-color:#ffd84d;color:#ffd84d}
.btn.green{border-color:#55ff99;color:#55ff99}
.card{
  background:#0d223d;
  border:1px solid #2f9cff;
  border-radius:12px;
  padding:10px;
  margin-bottom:8px;
}
.metric{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #244766;
  padding:7px 0;
  font-size:13px;
}
.metric:last-child{border-bottom:0}
.back{
  background:#ffcc00;
  color:#111;
  border:0;
  border-radius:10px;
  padding:10px;
  font-weight:bold;
  width:100%;
  margin-bottom:8px;
}
.mission{
  border-left:5px solid #ff4d4d;
  padding-left:8px;
  margin:8px 0;
  font-size:13px;
}
.footer{
  height:56px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  background:#020712;
  border-top:2px solid #1e90ff;
}
.nav{
  color:white;
  border:0;
  background:none;
  font-size:11px;
}
.nav.active{color:#ffd84d;font-weight:bold}
</style>
</head>
<body>
<div class="tc52">
  <div class="top">
    <div>▥ ZEBRA TC-52</div>
    <div class="secure">■ Data Secure</div>
    <div class="brand">F.R.I.E.N.D. v2.5</div>
  </div>

  <div class="screen" id="app"></div>

  <div class="footer">
    <button class="nav active" onclick="home()">Dashboard</button>
    <button class="nav" onclick="departments()">Departments</button>
    <button class="nav" onclick="missions()">Missions</button>
    <button class="nav" onclick="leader()">Leader</button>
  </div>
</div>

<script>
const data={
"Meat":{
score:"87",
status:"RED",
metrics:[
["Sales","+0.4%"],
["Labor","-0.1"],
["Fresh Shrink","-0.3"],
["Food Safety","100%"],
["Markdown Effectiveness","65%"],
["5S Backroom","94%"]
],
missions:[
"Complete markdown scan: eligible products only.",
"Verify thaw-and-sell execution: ribs, sausage, specialty meat.",
"Replenish fresh beef, chicken, pork, frozen meat, and lunch meat.",
"Clean and sanitize full service case and prep areas.",
"Coach associate on date rotation and customer engagement."
]
},
"Seafood":{
score:"91",
status:"YELLOW",
metrics:[
["Sales","+1.2%"],
["Shrink","-0.2"],
["Case Fullness","88%"],
["Food Safety","100%"],
["Ice / Display","92%"]
],
missions:[
"Refresh full service case presentation.",
"Verify temperatures and freshness standards.",
"Inspect dates and rotate packaged seafood.",
"Complete sanitation check before peak traffic."
]
},
"Deli":{
score:"84",
status:"RED",
metrics:[
["Production","82%"],
["Thaw & Sell","76%"],
["Shrink","High"],
["Service Case","88%"],
["Food Safety","97%"]
],
missions:[
"Prioritize production gaps before lunch rush.",
"Complete temp log and sanitation verification.",
"Review missed markdown opportunity list.",
"Coach team on service speed and suggestive selling."
]
},
"Produce":{
score:"89",
status:"YELLOW",
metrics:[
["Wet Rack","92%"],
["Fresh Cut","84%"],
["Shrink","Moderate"],
["Sales","+0.8%"],
["Rotation","90%"]
],
missions:[
"Cull wet rack and high-shrink displays.",
"Replenish berries, salads, bananas, and value wall.",
"Verify freshness standards on front tables.",
"Assign Fresh Start training to new associate."
]
},
"E-Commerce":{
score:"93",
status:"GREEN",
metrics:[
["Pick Accuracy","98%"],
["Wait Time","3:12"],
["Substitution Quality","91%"],
["On-Time Orders","96%"]
],
missions:[
"Monitor late order risk.",
"Review substitutions needing approval.",
"Support pickup staging during peak window."
]
},
"Front End":{
score:"88",
status:"YELLOW",
metrics:[
["Queue Time","4:25"],
["Friendly Score","91%"],
["Ring Tender","89%"],
["Cart Recovery","82%"]
],
missions:[
"Open lane support during 5 PM rush.",
"Coach greeting and closing interaction.",
"Assign cart recovery sweep."
]
},
"GM / HBC":{
score:"86",
status:"YELLOW",
metrics:[
["In Stock","87%"],
["Condition","90%"],
["Planogram","84%"],
["Sales","+0.3%"]
],
missions:[
"Recover top selling aisles.",
"Verify promotional endcaps.",
"Scan outs and correct shelf conditions."
]
},
"Receiving":{
score:"82",
status:"RED",
metrics:[
["Backroom 5S","78%"],
["Load Accuracy","91%"],
["Claims","Open"],
["Safety","Needs Review"]
],
missions:[
"Clear receiving pathway.",
"Process claims and damages.",
"Verify vendor check-in compliance."
]
}
};

function setNav(i){
 document.querySelectorAll(".nav").forEach((b,x)=>b.classList.toggle("active",x===i));
}

function home(){
 setNav(0);
 app.innerHTML=`
 <div class="title">Store #129 Command Dashboard</div>
 <div class="subtitle">Store Leader Overall Perspective</div>
 <div class="card">
   <div class="metric"><span>Composite Score</span><b>88</b></div>
   <div class="metric"><span>Priority Level</span><b style="color:#ff4d4d">RED</b></div>
   <div class="metric"><span>Projected Shrink Prevention</span><b>$487</b></div>
   <div class="metric"><span>Food Safety</span><b>99%</b></div>
 </div>
 <div class="grid">
   <div class="btn red" onclick="openDept('Meat')">Meat</div>
   <div class="btn yellow" onclick="openDept('Deli')">Deli</div>
   <div class="btn green" onclick="openDept('E-Commerce')">E-Commerce</div>
   <div class="btn yellow" onclick="openDept('Front End')">Front End</div>
 </div>
 `;
}

function departments(){
 setNav(1);
 let html=`<div class="title">Departments</div><div class="subtitle">Touch a department to open metrics, guidance, and missions.</div><div class="grid">`;
 Object.keys(data).forEach(d=>{
   let c=data[d].status==="RED"?"red":data[d].status==="GREEN"?"green":"yellow";
   html+=`<div class="btn ${c}" onclick="openDept('${d}')">${d}</div>`;
 });
 html+=`</div>`;
 app.innerHTML=html;
}

function openDept(name){
 const d=data[name];
 app.innerHTML=`
 <button class="back" onclick="departments()">← Back to Departments</button>
 <div class="title">${name} Department</div>
 <div class="subtitle">Composite ${d.score} • Priority ${d.status}</div>
 <div class="card">
   ${d.metrics.map(m=>`<div class="metric"><span>${m[0]}</span><b>${m[1]}</b></div>`).join("")}
 </div>
 <div class="card">
   <b>Guided Missions</b>
   ${d.missions.map(m=>`<div class="mission">${m}</div>`).join("")}
 </div>
 <div class="grid">
   <div class="btn" onclick="training('${name}')">Training</div>
   <div class="btn" onclick="guidance('${name}')">Guidance</div>
 </div>
 `;
}

function training(name){
 app.innerHTML=`
 <button class="back" onclick="openDept('${name}')">← Back</button>
 <div class="title">${name} Training</div>
 <div class="card">
   <div class="mission">Fresh Start module assigned.</div>
   <div class="mission">Retail operational training based on today’s weakest metric.</div>
   <div class="mission">AI individualized coaching: explain, show, verify, repeat.</div>
 </div>`;
}

function guidance(name){
 app.innerHTML=`
 <button class="back" onclick="openDept('${name}')">← Back</button>
 <div class="title">${name} Guidance</div>
 <div class="card">
   <div class="mission">Focus first on customer impact, food safety, shrink, and execution.</div>
   <div class="mission">Correct the system, not just the symptom.</div>
   <div class="mission">Leader action: inspect, teach, verify, recognize.</div>
 </div>`;
}

function missions(){
 setNav(2);
 app.innerHTML=`
 <div class="title">Priority Mission Engine</div>
 <div class="subtitle">Highest impact actions for the next operating window.</div>
 <div class="card">
   <div class="mission">RED: Meat markdown effectiveness below target.</div>
   <div class="mission">RED: Receiving 5S pathway needs immediate correction.</div>
   <div class="mission">YELLOW: Front End queue time trending high.</div>
   <div class="mission">GREEN: E-Commerce performing above standard.</div>
 </div>`;
}

function leader(){
 setNav(3);
 app.innerHTML=`
 <div class="title">Store Leader View</div>
 <div class="subtitle">Overall command perspective</div>
 <div class="card">
   <div class="metric"><span>Top Risk</span><b>Markdowns</b></div>
   <div class="metric"><span>Top Opportunity</span><b>Fresh Start Training</b></div>
   <div class="metric"><span>Best Department</span><b>E-Commerce</b></div>
   <div class="metric"><span>Leader Focus</span><b>Inspect + Coach</b></div>
 </div>
 <div class="card">
   <div class="mission">Use F.R.I.E.N.D. to translate store data into mission-level action.</div>
   <div class="mission">Prioritize the department with the highest customer, shrink, or food safety impact.</div>
 </div>`;
}

home();
</script>
</body>
</html>
10:30 AM
