<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>F.R.I.E.N.D. Zebra Touch Command</title>

<style>
:root{
  --blue:#0077ff;
  --red:#ff2f2f;
  --yellow:#ffd83d;
  --green:#38e27d;
  --white:#ffffff;
  --dark:#070b16;
  --panel:#101827;
  --panel2:#172237;
  --text:#eaf2ff;
  --muted:#8fa3bf;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:
    radial-gradient(circle at top, #13264a 0%, #070b16 55%),
    linear-gradient(180deg,#08101f,#05070d);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
}

.app{
  max-width:430px;
  min-height:100vh;
  margin:auto;
  padding:16px;
  padding-bottom:95px;
}

.header{
  border:1px solid rgba(255,255,255,.15);
  background:linear-gradient(135deg,#111d33,#07101f);
  border-radius:24px;
  padding:18px;
  box-shadow:0 0 25px rgba(0,119,255,.25);
}

.status{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:var(--muted);
}

.brand{
  margin-top:12px;
}

.brand h1{
  margin:0;
  font-size:30px;
  letter-spacing:4px;
}

.brand p{
  margin:6px 0 0;
  color:var(--muted);
  font-size:13px;
}

.priority{
  margin-top:15px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.badge{
  padding:8px 14px;
  border-radius:999px;
  font-weight:bold;
  background:rgba(255,47,47,.15);
  color:#ff7777;
  border:1px solid rgba(255,47,47,.45);
  box-shadow:0 0 18px rgba(255,47,47,.35);
}

.department-select{
  width:100%;
  margin-top:14px;
  padding:13px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.15);
  background:#0b1324;
  color:white;
  font-size:16px;
}

.command-circle{
  margin:22px auto;
  width:225px;
  height:225px;
  border-radius:50%;
  border:3px solid var(--blue);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:radial-gradient(circle,#15294d,#08101f 70%);
  box-shadow:
    0 0 25px rgba(0,119,255,.7),
    inset 0 0 30px rgba(0,119,255,.25);
}

.score{
  font-size:52px;
  font-weight:bold;
}

.score-label{
  color:var(--muted);
  font-size:13px;
  margin-top:4px;
}

.mission-title{
  margin-top:12px;
  color:var(--yellow);
  font-weight:bold;
  font-size:14px;
}

.tabs{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin:18px 0;
}

.tab{
  border:none;
  border-radius:16px;
  padding:11px 5px;
  background:#111b2e;
  color:white;
  font-size:12px;
  border:1px solid rgba(255,255,255,.12);
}

.tab.active{
  background:var(--blue);
  box-shadow:0 0 18px rgba(0,119,255,.55);
}

.panel{
  background:rgba(16,24,39,.92);
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:16px;
  margin-bottom:16px;
}

.panel h2{
  margin:0 0 12px;
  font-size:18px;
}

.metric{
  margin:12px 0;
}

.metric-row{
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

.bar{
  height:9px;
  background:#06101f;
  border-radius:999px;
  overflow:hidden;
  margin-top:7px;
}

.fill{
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--blue),var(--green));
}

.mission{
  padding:13px;
  border-radius:18px;
  background:#0c1424;
  margin:10px 0;
  border-left:5px solid var(--blue);
}

.mission.red{border-left-color:var(--red)}
.mission.yellow{border-left-color:var(--yellow)}
.mission.green{border-left-color:var(--green)}

.mission strong{
  display:block;
  margin-bottom:5px;
}

.mission span{
  color:var(--muted);
  font-size:13px;
}

.bottom-nav{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  max-width:430px;
  width:calc(100% - 24px);
  background:#111827;
  border:1px solid rgba(255,255,255,.15);
  border-radius:28px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  padding:8px;
  box-shadow:0 0 25px rgba(0,0,0,.55);
}

.nav-btn{
  border:none;
  background:transparent;
  color:white;
  padding:10px 2px;
  border-radius:22px;
  font-size:11px;
}

.nav-btn.active{
  background:#26364f;
  color:#61b4ff;
}

.small{
  color:var(--muted);
  font-size:13px;
}
</style>
</head>

<body>
<div class="app">

  <div class="header">
    <div class="status">
      <span>10:46</span>
      <span>5G 88%</span>
    </div>

    <div class="brand">
      <h1>F.R.I.E.N.D.</h1>
      <p>Full Retail Integration Engaged Network Dynamics</p>
      <p>Zebra Touch Command • Store #129</p>
    </div>

    <div class="priority">
      <span>Guided Mission Engine</span>
      <span class="badge" id="priorityBadge">RED</span>
    </div>

    <select class="department-select" id="departmentSelect" onchange="changeDepartment()">
      <option>Meat</option>
      <option>Seafood</option>
      <option>Deli</option>
      <option>Bakery</option>
      <option>Produce</option>
      <option>Grocery</option>
      <option>Front End</option>
      <option>E-Commerce</option>
      <option>GM</option>
      <option>HBC</option>
      <option>Homeside</option>
      <option>Receiving</option>
      <option>Maintenance</option>
      <option>Starbucks</option>
      <option>Murray's Cheese</option>
      <option>Liquor</option>
    </select>
  </div>

  <div class="command-circle">
    <div class="score" id="score">82</div>
    <div class="score-label">Composite Score</div>
    <div class="mission-title" id="missionTitle">Complete Markdown Opportunities</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showView('home',this)">Home</button>
    <button class="tab" onclick="showView('missions',this)">Missions</button>
    <button class="tab" onclick="showView('metrics',this)">Metrics</button>
    <button class="tab" onclick="showView('training',this)">Training</button>
    <button class="tab" onclick="showView('leader',this)">Leader</button>
  </div>

  <div id="content"></div>

</div>

<div class="bottom-nav">
  <button class="nav-btn active">⌂<br>Home</button>
  <button class="nav-btn">◆<br>Inbox</button>
  <button class="nav-btn">▦<br>Explore</button>
  <button class="nav-btn">◎<br>Training</button>
  <button class="nav-btn">✦<br>Copilot</button>
</div>

<script>
const departments = {
  "Meat": {
    score:82,
    priority:"RED",
    mission:"Complete Markdown Opportunities",
    metrics:[
      ["Sales Momentum",78],
      ["Labor Alignment",91],
      ["Fresh Shrink Control",64],
      ["Markdown Effectiveness",65],
      ["Food Safety",100],
      ["5S Backroom Standard",94]
    ],
    missions:[
      ["RED","Complete Markdown Scan","Review eligible short-date products only. Exclude non-markdown categories."],
      ["YELLOW","Thaw & Sell Planning","Verify specialty meat, pork ribs, sausage, breakfast links and patties."],
      ["GREEN","Full Service Case","Engage customers, recover presentation, and check freshness."]
    ],
    training:[
      "Fresh Start: Markdown accuracy",
      "Retail Operations: Thaw & Sell execution",
      "AI Interpretation: Shrink opportunity pattern"
    ]
  },

  "Seafood": {
    score:86,
    priority:"YELLOW",
    mission:"Verify Freshness & Case Standards",
    metrics:[
      ["Sales Momentum",84],
      ["Fresh Shrink Control",79],
      ["Case Presentation",92],
      ["Food Safety",100],
      ["Customer Service",90],
      ["5S Standard",88]
    ],
    missions:[
      ["YELLOW","Freshness Walk","Check dates, odor, ice levels, and seafood case presentation."],
      ["GREEN","Customer Engagement","Recommend meal solutions and upsell seafood pairings."],
      ["GREEN","Sanitation Review","Verify surfaces, tools, and holding areas are clean."]
    ],
    training:[
      "Fresh Start: Seafood freshness signals",
      "Retail Operations: Full service case engagement",
      "AI Interpretation: Shrink and freshness risk"
    ]
  },

  "Deli": {
    score:79,
    priority:"RED",
    mission:"Production & Service Recovery",
    metrics:[
      ["Production Completion",72],
      ["Service Level",81],
      ["Food Safety",98],
      ["Shrink Control",69],
      ["Labor Alignment",76],
      ["Training Completion",85]
    ],
    missions:[
      ["RED","Production Gap Review","Complete high-priority production items before peak traffic."],
      ["YELLOW","Service Counter Focus","Reduce wait time and improve associate coverage."],
      ["GREEN","Fresh Start Coaching","Pair new associate with certified trainer."]
    ],
    training:[
      "Fresh Start: Deli production rhythm",
      "Retail Operations: Service counter standards",
      "AI Interpretation: Labor and production balancing"
    ]
  },

  "Bakery": {
    score:88,
    priority:"YELLOW",
    mission:"Balance Production & Presentation",
    metrics:[
      ["Sales Momentum",89],
      ["Production Completion",84],
      ["Shrink Control",80],
      ["Presentation",94],
      ["Food Safety",100],
      ["Training",86]
    ],
    missions:[
      ["YELLOW","Production Check","Confirm bake plan aligns with projected demand."],
      ["GREEN","Presentation Walk","Refresh tables, displays, and seasonal features."],
      ["GREEN","Date Rotation","Verify rotation on packaged bakery items."]
    ],
    training:[
      "Fresh Start: Bakery production planning",
      "Retail Operations: Display standards",
      "AI Interpretation: Demand-based production"
    ]
  },

  "Produce": {
    score:84,
    priority:"YELLOW",
    mission:"Freshness & Replenishment Focus",
    metrics:[
      ["Sales Momentum",82],
      ["Freshness",78],
      ["Replenishment",87],
      ["Shrink Control",73],
      ["Wet Rack Standard",90],
      ["5S Standard",88]
    ],
    missions:[
      ["YELLOW","Freshness Rotation","Cull, rotate, and recover high-risk produce areas."],
      ["YELLOW","Replenishment Push","Refill top movement items before peak period."],
      ["GREEN","Wet Rack Review","Verify misting, trim, and presentation."]
    ],
    training:[
      "Fresh Start: Produce freshness",
      "Retail Operations: Replenishment rhythm",
      "AI Interpretation: Shrink risk by commodity"
    ]
  },

  "Grocery": {
    score:90,
    priority:"GREEN",
    mission:"Maintain Fill & Execution",
    metrics:[
      ["In-Stock",91],
      ["Conditioning",89],
      ["Backstock Accuracy",86],
      ["Labor Alignment",92],
      ["Replenishment",90],
      ["5S Standard",87]
    ],
    missions:[
      ["GREEN","Top Off Priority Aisles","Maintain fill level on high-volume categories."],
      ["GREEN","Backstock Accuracy","Verify backroom organization and scan integrity."],
      ["YELLOW","Endcap Review","Confirm promotional displays match plan."]
    ],
    training:[
      "Fresh Start: Aisle ownership",
      "Retail Operations: Backstock control",
      "AI Interpretation: Out-of-stock prevention"
    ]
  },

  "Front End": {
    score:81,
    priority:"RED",
    mission:"Reduce Wait Time & Improve Service",
    metrics:[
      ["Wait Time",68],
      ["Customer Service",84],
      ["Labor Alignment",73],
      ["Cart Recovery",88],
      ["Checkout Accuracy",91],
      ["Training",79]
    ],
    missions:[
      ["RED","Queue Recovery","Open lanes or redirect traffic to reduce wait time."],
      ["YELLOW","Cart Flow","Recover cart supply before evening rush."],
      ["GREEN","Service Coaching","Recognize positive associate interactions."]
    ],
    training:[
      "Fresh Start: Customer-first checkout",
      "Retail Operations: Queue management",
      "AI Interpretation: Front end labor demand"
    ]
  },

  "E-Commerce": {
    score:77,
    priority:"RED",
    mission:"Improve Pick Accuracy & On-Time Rate",
    metrics:[
      ["Pick Accuracy",76],
      ["On-Time Rate",70],
      ["Substitution Quality",74],
      ["Customer Satisfaction",82],
      ["Labor Alignment",75],
      ["Staging Accuracy",88]
    ],
    missions:[
      ["RED","Late Order Recovery","Prioritize orders at risk of missing pickup window."],
      ["YELLOW","Substitution Review","Coach quality substitution decision-making."],
      ["GREEN","Staging Audit","Verify staging zones and order accuracy."]
    ],
    training:[
      "Fresh Start: Picking accuracy",
      "Retail Operations: Pickup promise execution",
      "AI Interpretation: Order risk prediction"
    ]
  }
};

const defaultDept = {
  score:85,
  priority:"YELLOW",
  mission:"Execute Department Standards",
  metrics:[
    ["Operational Readiness",84],
    ["Customer Service",88],
    ["Labor Alignment",82],
    ["Task Completion",86],
    ["Safety",95],
    ["Training",80]
  ],
  missions:[
    ["YELLOW","Standard Walk","Verify department readiness and correct visible gaps."],
    ["GREEN","Customer Focus","Increase engagement during peak traffic."],
    ["GREEN","5S Review","Organize, clean, standardize, and sustain."]
  ],
  training:[
    "Fresh Start: Department fundamentals",
    "Retail Operations: Daily execution",
    "AI Interpretation: Opportunity detection"
  ]
};

let currentView = "home";

function getDept(){
  const name = document.getElementById("departmentSelect").value;
  return departments[name] || defaultDept;
}

function changeDepartment(){
  const d = getDept();
  document.getElementById("score").innerText = d.score;
  document.getElementById("priorityBadge").innerText = d.priority;
  document.getElementById("missionTitle").innerText = d.mission;
  render();
}

function showView(view,btn){
  currentView = view;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function renderMetrics(metrics){
  return metrics.map(m=>`
    <div class="metric">
      <div class="metric-row">
        <span>${m[0]}</span>
        <strong>${m[1]}%</strong>
      </div>
      <div class="bar"><div class="fill" style="width:${m[1]}%"></div></div>
    </div>
  `).join("");
}

function renderMissions(missions){
  return missions.map(m=>`
    <div class="mission ${m[0].toLowerCase()}">
      <strong>${m[0]} • ${m[1]}</strong>
      <span>${m[2]}</span>
    </div>
  `).join("");
}

function render(){
  const d = getDept();
  const deptName = document.getElementById("departmentSelect").value;
  const content = document.getElementById("content");

  if(currentView === "home"){
    content.innerHTML = `
      <div class="panel">
        <h2>${deptName} Command Summary</h2>
        <p class="small">AI has analyzed department conditions and selected the highest-value mission for immediate execution.</p>
        ${renderMissions([d.missions[0]])}
      </div>
      <div class="panel">
        <h2>Composite Metrics</h2>
        ${renderMetrics(d.metrics)}
      </div>
    `;
  }

  if(currentView === "missions"){
    content.innerHTML = `
      <div class="panel">
        <h2>Guided Missions</h2>
        ${renderMissions(d.missions)}
      </div>
    `;
  }

  if(currentView === "metrics"){
    content.innerHTML = `
      <div class="panel">
        <h2>${deptName} Metrics</h2>
        ${renderMetrics(d.metrics)}
      </div>
    `;
  }

  if(currentView === "training"){
    content.innerHTML = `
      <div class="panel">
        <h2>Fresh Start Training</h2>
        ${d.training.map(t=>`
          <div class="mission green">
            <strong>${t}</strong>
            <span>Individualized coaching module generated from department opportunities.</span>
          </div>
        `).join("")}
      </div>
    `;
  }

  if(currentView === "leader"){
    content.innerHTML = `
      <div class="panel">
        <h2>Leader Intelligence</h2>
        <div class="mission yellow">
          <strong>AI Recommendation</strong>
          <span>Coach the highest-risk opportunity first, then verify completion through observation and follow-up.</span>
        </div>
        <div class="mission green">
          <strong>Development Signal</strong>
          <span>Use mission completion, customer impact, and consistency to identify future leadership potential.</span>
        </div>
        <div class="mission red">
          <strong>Correction Signal</strong>
          <span>Repeated missed standards indicate a need for direct coaching, retraining, or accountability.</span>
        </div>
      </div>
    `;
  }
}

render();
</script>
</body>
</html>
