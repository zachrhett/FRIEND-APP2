<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>F.R.I.E.N.D. TC-52</title>
<style>
:root{--blue:#0072ce;--cyan:#00b7ff;--yellow:#ffc220;--red:#e31837;--bg:#050912;--text:#f5f8ff;--muted:#9fb4cf;--line:rgba(255,255,255,.13)}
*{box-sizing:border-box}
html,body{margin:0;background:#02040a;color:var(--text);font-family:Arial,Helvetica,sans-serif;height:100%;overflow:hidden}
body{display:flex;align-items:center;justify-content:center}
.tc52{width:360px;height:640px;background:linear-gradient(160deg,#07101f,#02040a);border:12px solid #1a1d24;border-radius:36px;box-shadow:0 0 30px rgba(0,183,255,.25);overflow:hidden}
.status{height:28px;padding:6px 14px;display:flex;justify-content:space-between;font-size:12px;background:#070b14}
.app{height:calc(100% - 28px);display:flex;flex-direction:column}
header{height:72px;padding:9px 12px;border-bottom:1px solid var(--line);background:radial-gradient(circle at top right,rgba(0,114,206,.35),transparent 55%)}
.brand{display:flex;justify-content:space-between;align-items:center}
.brand h1{font-size:18px;margin:0;letter-spacing:3px}
.version{font-size:10px;color:var(--muted)}
.context{margin-top:8px;display:flex;gap:6px}
select,button{font:inherit}
select{flex:1;background:#0d1728;color:white;border:1px solid var(--line);border-radius:10px;padding:8px;font-size:12px}
.main{flex:1;display:flex;overflow:hidden}
.left{width:86px;border-right:1px solid var(--line);padding:8px 6px;background:rgba(255,255,255,.03);overflow:auto}
.deptBtn,.navBtn,.subBtn{width:100%;border:1px solid var(--line);border-radius:12px;background:#111c30;color:white;padding:9px 5px;margin-bottom:6px;font-weight:700;font-size:11px}
.deptBtn.active,.navBtn.active,.subBtn.active{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,183,255,.35);background:#07345a}
.content{flex:1;padding:9px;overflow:auto}
.screen{display:none}.screen.active{display:block}
.card{background:linear-gradient(180deg,rgba(23,32,51,.98),rgba(10,17,30,.98));border:1px solid var(--line);border-radius:16px;padding:10px;margin-bottom:8px}
.title{font-size:14px;font-weight:800;margin-bottom:6px}
.small{font-size:11px;color:var(--muted);line-height:1.35}
.priorityWrap{display:flex;justify-content:center;margin:8px 0 10px}
.priority{width:128px;height:128px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid var(--red)}
.priority span{font-size:12px;color:var(--muted)}
.priority b{font-size:28px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.metric{background:#0b1322;border:1px solid var(--line);border-radius:12px;padding:8px}
.metric b{display:block;font-size:15px}
.metric span{font-size:10px;color:var(--muted)}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.sub{display:none}.sub.active{display:block}
.item{border-left:3px solid var(--cyan);padding:7px 8px;background:#081121;border-radius:8px;margin-bottom:6px;font-size:12px}
.alert{border-left-color:var(--red)}
.train{border-left-color:var(--yellow)}
.bottom{height:58px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:7px;background:#070b14;border-top:1px solid var(--line)}
.navBtn{margin:0;padding:7px 2px;font-size:10px}
</style>
</head>

<body>
<div class="tc52">
  <div class="status"><b>ZEBRA</b><span>10:30 AM LTE 68%</span></div>

  <div class="app">
    <header>
      <div class="brand">
        <h1>F.R.I.E.N.D.</h1>
        <div class="version">v2.4.1 • Data Secure</div>
      </div>
      <div class="context">
        <select id="deptSelect"></select>
        <select id="roleSelect">
          <option>Store Leader</option>
          <option>Department Leader</option>
          <option>Associate</option>
        </select>
      </div>
    </header>

    <div class="main">
      <aside class="left" id="deptRail"></aside>
      <section class="content">
        <div id="missions" class="screen active"></div>
        <div id="alerts" class="screen"></div>
        <div id="training" class="screen"></div>
        <div id="leader" class="screen"></div>
      </section>
    </div>

    <nav class="bottom">
      <button class="navBtn active" data-screen="missions">MISSIONS</button>
      <button class="navBtn" data-screen="alerts">ALERTS</button>
      <button class="navBtn" data-screen="training">TRAINING</button>
      <button class="navBtn" data-screen="leader">LEADER</button>
    </nav>
  </div>
</div>

<script>
const departments = {
 "Store Overall": {
  priority:"RED", score:84,
  mission:"Recover store execution by aligning labor, markdowns, fresh standards, queue response, and training.",
  metrics:[["Sales","+0.4%"],["Labor","-0.1"],["Fresh Shrink","-0.3"],["Food Safety","100%"]],
  subs:{
   "Composite":["Store composite is stable but execution variance exists between fresh, front end, and replenishment.","Highest opportunity: markdown completion, queue speed, and mission closure."],
   "Guidance":["Walk fresh departments first.","Verify red missions are assigned.","Review labor against demand windows.","Close customer-impacting alerts before noon."],
   "Metrics":["Composite 84","Mission completion 72%","Training current 91%","Customer impact risk Medium"]
  }
 },
 "Meat": {
  priority:"RED", score:78,
  mission:"Complete markdown opportunities and protect freshness in thaw & sell, lunch meat, frozen, and full service case.",
  metrics:[["Markdown","65%"],["Temps","100%"],["5S","94%"],["Shrink Risk","$87"]],
  subs:{
   "Composite":["Meat is impacted by markdown effectiveness. System includes non-eligible categories, so leader review is required.","Thaw & sell focus: specialty meat, pork ribs, sausage, breakfast links/patties, and shaved beef/chicken."],
   "Guidance":["Scan eligible markdowns.","Fill fresh beef/chicken and packaged lunch meat.","Verify frozen meat recovery.","Check full service case cleanliness and service posture."],
   "Metrics":["Projected shrink prevention $87","Markdown eligible 89%","Backroom 5S 94%","Food safety 100%"]
  }
 },
 "Seafood": {
  priority:"YELLOW", score:86,
  mission:"Protect case freshness, service readiness, sanitation, and rotation.",
  metrics:[["Case Fill","92%"],["Temps","100%"],["Service","88%"],["Shrink","Low"]],
  subs:{
   "Composite":["Seafood is service-sensitive. Case condition and freshness cues drive confidence."],
   "Guidance":["Verify ice/case presentation.","Rotate dated product.","Sanitize touch points.","Engage customers at case."],
   "Metrics":["Case fill 92%","Service response 88%","Sanitation complete"]
  }
 },
 "Produce": {
  priority:"YELLOW", score:88,
  mission:"Recover wet rack, banana table, berries, and freshness walks.",
  metrics:[["Fresh","91%"],["OOS","6"],["Crisp","89%"],["Cull","Due"]],
  subs:{
   "Composite":["Produce opportunity is visual abundance and freshness consistency."],
   "Guidance":["Cull first.","Fill high velocity tables.","Mist and rotate wet rack.","Record out of stocks."],
   "Metrics":["Fresh index 91%","Cull compliance 83%","Sales +0.6%"]
  }
 },
 "Deli": {
  priority:"RED", score:76,
  mission:"Stabilize production, service counter wait time, food safety, and closing standards.",
  metrics:[["Wait","High"],["Prod","82%"],["Temps","100%"],["Close","Due"]],
  subs:{
   "Composite":["Deli risk is driven by service bottlenecks and production timing."],
   "Guidance":["Assign counter owner.","Complete production list.","Verify hot/cold logs.","Stage closing tasks early."],
   "Metrics":["Production 82%","Service wait elevated","Food safety 100%"]
  }
 },
 "Bakery": {
  priority:"YELLOW", score:85,
  mission:"Complete bake plan, packaging, markdowns, and table presentation.",
  metrics:[["Bake","88%"],["MD","70%"],["Tables","90%"],["Safety","Good"]],
  subs:{
   "Composite":["Bakery needs stronger markdown discipline and table replenishment."],
   "Guidance":["Review bake plan.","Package priority items.","Scan markdowns.","Refresh front tables."],
   "Metrics":["Bake completion 88%","Markdown 70%","Table condition 90%"]
  }
 },
 "Grocery": {
  priority:"YELLOW", score:87,
  mission:"Close top out-of-stocks, condition endcaps, and align replenishment to demand.",
  metrics:[["OOS","14"],["Backstock","Med"],["Ends","91%"],["Labor","OK"]],
  subs:{
   "Composite":["Grocery is stable with opportunity in out-of-stock recovery."],
   "Guidance":["Attack top 20 OOS.","Face high traffic aisles.","Verify endcaps.","Clear receiving holds."],
   "Metrics":["OOS 14","Endcap condition 91%","Backstock medium"]
  }
 },
 "Front End": {
  priority:"RED", score:77,
  mission:"Reduce queue pressure, improve service speed, and support customer recovery.",
  metrics:[["Queue","High"],["VOC","82"],["Cashier","Short"],["Safety","Good"]],
  subs:{
   "Composite":["Front End is customer-impact critical. Queue response is priority."],
   "Guidance":["Open relief lane.","Deploy bagging help.","Watch self-checkout alerts.","Greet every customer."],
   "Metrics":["Queue high","VOC 82","Labor short"]
  }
 },
 "E-commerce": {
  priority:"RED", score:79,
  mission:"Improve pick speed, substitutions, staging accuracy, and handoff time.",
  metrics:[["Pick","92%"],["Sub","High"],["Stage","86%"],["Wait","Med"]],
  subs:{
   "Composite":["E-commerce risk is substitution quality and staging accuracy."],
   "Guidance":["Review late orders.","Assign staging check.","Coach substitutions.","Escalate chronic OOS."],
   "Metrics":["Pick completion 92%","Staging 86%","Wait medium"]
  }
 },
 "GM": {
  priority:"GREEN", score:91,
  mission:"Maintain seasonal execution, price integrity, and recovery.",
  metrics:[["Seasonal","93%"],["Price","98%"],["Recovery","90%"],["Safety","Good"]],
  subs:{
   "Composite":["GM is healthy. Maintain recovery and seasonal readiness."],
   "Guidance":["Check seasonal plan.","Verify price tags.","Recover high-traffic areas."],
   "Metrics":["Seasonal 93%","Price integrity 98%"]
  }
 },
 "HBC": {
  priority:"YELLOW", score:84,
  mission:"Improve fill, locked item response, and price accuracy.",
  metrics:[["Fill","86%"],["Price","96%"],["Service","82%"],["OOS","9"]],
  subs:{
   "Composite":["HBC opportunity is customer access and fill consistency."],
   "Guidance":["Review locked case calls.","Fill top movers.","Verify tags."],
   "Metrics":["Fill 86%","Locked response 82%","OOS 9"]
  }
 },
 "Homeside": {
  priority:"GREEN", score:90,
  mission:"Maintain recovery, seasonal transition, and backroom organization.",
  metrics:[["Recovery","91%"],["Seasonal","89%"],["5S","92%"],["OOS","4"]],
  subs:{
   "Composite":["Homeside is stable."],
   "Guidance":["Recover aisle ends.","Stage transition items.","Clear backroom clutter."],
   "Metrics":["Recovery 91%","5S 92%"]
  }
 },
 "Receiving": {
  priority:"YELLOW", score:83,
  mission:"Clear docks, verify invoices, stage loads, and protect cold chain.",
  metrics:[["Dock","Busy"],["Cold","100%"],["Invoices","2"],["5S","85%"]],
  subs:{
   "Composite":["Receiving is operationally loaded. Cold chain is protected."],
   "Guidance":["Prioritize cold loads.","Clear dock paths.","Verify invoice exceptions.","Stage by department."],
   "Metrics":["Cold chain 100%","5S 85%","Invoice exceptions 2"]
  }
 },
 "Maintenance": {
  priority:"YELLOW", score:82,
  mission:"Close restroom, spill, cart, and safety missions.",
  metrics:[["Restroom","Due"],["Spills","0"],["Carts","Med"],["Safety","Open"]],
  subs:{
   "Composite":["Maintenance focus is safety visibility and customer-facing standards."],
   "Guidance":["Complete restroom check.","Sweep entry.","Clear carts.","Close safety hazards."],
   "Metrics":["Restroom due","Open safety mission","Spills 0"]
  }
 },
 "Starbucks": {
  priority:"GREEN", score:89,
  mission:"Maintain service speed, cleanliness, and product availability.",
  metrics:[["Speed","Good"],["Stock","88%"],["Clean","92%"],["VOC","90"]],
  subs:{
   "Composite":["Starbucks is stable with stock opportunity."],
   "Guidance":["Restock peak items.","Wipe customer area.","Confirm breaks around rush."],
   "Metrics":["Stock 88%","Cleanliness 92%","VOC 90"]
  }
 },
 "Murray's Cheese": {
  priority:"GREEN", score:92,
  mission:"Maintain specialty presentation, sampling readiness, and shrink control.",
  metrics:[["Display","94%"],["MD","85%"],["Stock","91%"],["Service","Good"]],
  subs:{
   "Composite":["Murray's Cheese is strong. Keep specialty display premium."],
   "Guidance":["Refresh display.","Review dates.","Prepare customer recommendations."],
   "Metrics":["Display 94%","Markdown 85%","Stock 91%"]
  }
 },
 "Liquor": {
  priority:"YELLOW", score:85,
  mission:"Verify age-compliance, fill, recovery, and promo execution.",
  metrics:[["Compliance","100%"],["Fill","88%"],["Promo","90%"],["OOS","5"]],
  subs:{
   "Composite":["Liquor is compliance strong with fill opportunity."],
   "Guidance":["Check promo displays.","Fill top sellers.","Verify age-compliance reminders."],
   "Metrics":["Compliance 100%","Fill 88%","Promo 90%"]
  }
 }
};

let currentDept = "Store Overall";
let currentScreen = "missions";

const deptRail = document.getElementById("deptRail");
const deptSelect = document.getElementById("deptSelect");

function init(){
 Object.keys(departments).forEach(d=>{
  const opt=document.createElement("option");
  opt.textContent=d;
  deptSelect.appendChild(opt);

  const btn=document.createElement("button");
  btn.className="deptBtn";
  btn.textContent=d.replace("Store Overall","Store");
  btn.onclick=()=>setDept(d);
  deptRail.appendChild(btn);
 });

 deptSelect.onchange=()=>setDept(deptSelect.value);

 document.querySelectorAll(".navBtn").forEach(b=>{
  b.onclick=()=>setScreen(b.dataset.screen);
 });

 setDept(currentDept);
}

function setDept(d){
 currentDept=d;
 deptSelect.value=d;

 document.querySelectorAll(".deptBtn").forEach(b=>{
  b.classList.toggle("active", b.textContent===d || (d==="Store Overall" && b.textContent==="Store"));
 });

 renderAll();
}

function setScreen(s){
 currentScreen=s;

 document.querySelectorAll(".navBtn").forEach(b=>{
  b.classList.toggle("active",b.dataset.screen===s);
 });

 document.querySelectorAll(".screen").forEach(x=>{
  x.classList.toggle("active",x.id===s);
 });
}

function colorFor(p){
 return p==="RED" ? "var(--red)" : p==="YELLOW" ? "var(--yellow)" : "#00d084";
}

function renderAll(){
 renderMissions();
 renderAlerts();
 renderTraining();
 renderLeader();
 setScreen(currentScreen);
}

function renderMissions(){
 const d=departments[currentDept];
 const c=document.getElementById("missions");

 c.innerHTML=`
 <div class="card">
  <div class="title">${currentDept} Mission Command</div>
  <div class="small">Today is May 12, 2024 • Last Updated 9:45 AM</div>

  <div class="priorityWrap">
   <div class="priority" style="border-color:${colorFor(d.priority)};box-shadow:0 0 24px ${colorFor(d.priority)}">
    <span>PRIORITY</span>
    <b>${d.priority}</b>
    <span>Score ${d.score}</span>
   </div>
  </div>

  <div class="item alert">${d.mission}</div>
 </div>

 <div class="grid">
  ${d.metrics.map(m=>`<div class="metric"><b>${m[1]}</b><span>${m[0]}</span></div>`).join("")}
 </div>

 <div class="card">
  <div class="title">Touchscreen Workflows</div>
  <div class="tabs">
   ${Object.keys(d.subs).map((s,i)=>`<button class="subBtn ${i===0?'active':''}" onclick="openSub('${s}')">${s}</button>`).join("")}
  </div>

  ${Object.keys(d.subs).map((s,i)=>`
   <div class="sub ${i===0?'active':''}" id="sub-${s}">
    ${d.subs[s].map(x=>`<div class="item">${x}</div>`).join("")}
   </div>
  `).join("")}
 </div>
 `;
}

function openSub(s){
 document.querySelectorAll(".subBtn").forEach(b=>{
  b.classList.toggle("active",b.textContent===s);
 });

 document.querySelectorAll(".sub").forEach(x=>{
  x.classList.toggle("active",x.id==="sub-"+s);
 });
}

function renderAlerts(){
 const d=departments[currentDept];

 document.getElementById("alerts").innerHTML=`
 <div class="card">
  <div class="title">${currentDept} Alerts</div>
  <div class="item alert">Priority ${d.priority}: ${d.mission}</div>
  <div class="item alert">Open exception: verify department execution before next update.</div>
  <div class="item">Data Secure • Leader acknowledgement required.</div>
 </div>
 `;
}

function renderTraining(){
 document.getElementById("training").innerHTML=`
 <div class="card">
  <div class="title">${currentDept} Training</div>
  <div class="item train">Fresh Start: role-based coaching path assigned.</div>
  <div class="item train">Retail Operational Module: dynamic complexity interpretation.</div>
  <div class="item train">AI Guidance: explain the why, show the standard, verify the result.</div>
 </div>
 `;
}

function renderLeader(){
 const d=departments[currentDept];

 document.getElementById("leader").innerHTML=`
 <div class="card">
  <div class="title">Leader Perspective</div>
  <div class="item">Ask: What is the highest customer-impact mission?</div>
  <div class="item">Assign: Owner, time target, and verification standard.</div>
  <div class="item">Verify: ${currentDept} score ${d.score}, priority ${d.priority}.</div>
  <div class="item">Coach: Build capability, not just compliance.</div>
 </div>
 `;
}

init();
</script>
</body>
</html>
